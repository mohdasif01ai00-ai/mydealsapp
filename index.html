<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Deals App</title>
    <style>
        /* पूरे पेज की सेटिंग */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            color: #333;
            padding-bottom: 30px;
        }

        /* ऐप का ऊपरी हिस्सा (Header) */
        .app-header {
            background-color: #1e293b;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* बैनर स्लाइडर स्टाइल */
        .app-slider-container {
            width: 100%;
            max-width: 600px;
            margin: 10px auto;
            overflow: hidden;
            position: relative;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .app-slider {
            display: flex;
            transition: transform 0.5s ease-in-out;
            width: 300%; 
        }
        .app-slide {
            width: 100%;
            flex-shrink: 0;
        }
        .app-slide img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
        }

        /* हेडिंग स्टाइल */
        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin: 20px 15px 10px 15px;
            color: #1e293b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 12 कैटेगरी का ग्रिड */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px 10px;
            padding: 0 15px;
            margin-bottom: 20px;
        }
        .category-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            text-decoration: none;
            color: #475569;
        }
        .category-img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #ffffff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            margin-bottom: 6px;
        }
        .category-name {
            font-size: 11px;
            font-weight: 600;
        }

        /* प्रोडक्ट्स/डील्स सेक्शन */
        .deals-container {
            padding: 0 15px;
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px;
        }
        .product-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }
        .product-img {
            width: 100%;
            height: 130px;
            object-fit: cover;
        }
        .product-info {
            padding: 10px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .product-title {
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 4px;
            height: 36px;
            overflow: hidden;
        }
        .product-price {
            margin-bottom: 10px;
        }
        .current-price {
            font-size: 15px;
            font-weight: bold;
            color: #dc2626;
        }
        .old-price {
            font-size: 11px;
            text-decoration: line-through;
            color: #94a3b8;
            margin-left: 5px;
        }

        /* व्हाट्सएप बटन स्टाइल */
        .whatsapp-btn {
            background-color: #25D366;
            color: white;
            text-decoration: none;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            padding: 8px;
            border-radius: 6px;
            display: block;
            margin-top: auto;
            box-shadow: 0 2px 4px rgba(37, 211, 102, 0.2);
        }
    </style>
</head>
<body>

    <!-- ऐप का नाम -->
    <div class="app-header">
        My Deals App
    </div>

    <!-- 1. ऑटोमेटिक बैनर स्लाइडर -->
    <div class="app-slider-container">
        <div class="app-slider" id="mainSlider">
            <div class="app-slide"><img src="https://picsum.photos/600/200?random=1" alt="Mega Offer"></div>
            <div class="app-slide"><img src="https://picsum.photos/600/200?random=2" alt="Fashion Sale"></div>
            <div class="app-slide"><img src="https://picsum.photos/600/200?random=3" alt="Electronics Deal"></div>
        </div>
    </div>

    <!-- 2. टॉप 12 कैटेगरीज -->
    <div class="section-title">Top Categories</div>
    <div class="categories-grid">
        <!-- 1 -->
        <a class="category-item" href="#mobiles">
            <img class="category-img" src="https://picsum.photos/100/100?random=11" alt="Mobiles">
            <span class="category-name">Mobiles</span>
        </a>
        <!-- 2 -->
        <a class="category-item" href="#clothes">
            <img class="category-img" src="https://picsum.photos/100/100?random=12" alt="Fashion">
            <span class="category-name">Fashion</span>
        </a>
        <!-- 3 -->
        <a class="category-item" href="#electronics">
            <img class="category-img" src="https://picsum.photos/100/100?random=13" alt="Electronics">
            <span class="category-name">Electronics</span>
        </a>
        <!-- 4 -->
        <a class="category-item" href="#home">
            <img class="category-img" src="https://picsum.photos/100/100?random=14" alt="Home">
            <span class="category-name">Home</span>
        </a>
        <!-- 5 -->
        <a class="category-item" href="#appliances">
            <img class="category-img" src="https://picsum.photos/100/100?random=15" alt="Appliances">
            <span class="category-name">Appliances</span>
        </a>
        <!-- 6 -->
        <a class="category-item" href="#beauty">
            <img class="category-img" src="https://picsum.photos/100/100?random=16" alt="Beauty">
            <span class="category-name">Beauty</span>
        </a>
        <!-- 7 -->
        <a class="category-item" href="#toys">
            <img class="category-img" src="https://picsum.photos/100/100?random=17" alt="Toys">
            <span class="category-name">Toys & Sports</span>
        </a>
        <!-- 8 -->
        <a class="category-item" href="#grocery">
            <img class="category-img" src="https://picsum.photos/100/100?random=18" alt="Grocery">
            <span class="category-name">Grocery</span>
        </a>
        <!-- 9 -->
        <a class="category-item" href="#footwear">
            <img class="category-img" src="https://picsum.photos/100/100?random=19" alt="Footwear">
            <span class="category-name">Footwear</span>
        </a>
        <!-- 10 -->
        <a class="category-item" href="#watches">
            <img class="category-img" src="https://picsum.photos/100/100?random=20" alt="Watches">
            <span class="category-name">Watches</span>
        </a>
        <!-- 11 -->
        <a class="category-item" href="#accessories">
            <img class="category-img" src="https://picsum.photos/100/100?random=21" alt="Accessories">
            <span class="category-name">Accessories</span>
        </a>
        <!-- 12 -->
        <a class="category-item" href="#offers">
            <img class="category-img" src="https://picsum.photos/100/100?random=22" alt="Offers">
            <span class="category-name">Top Offers</span>
        </a>
    </div>

    <!-- 3. बेस्ट डील्स सेक्शन -->
    <div class="section-title">🔥 Today's Best Deals</div>
    <div class="deals-container">
        
        <!-- प्रोडक्ट 1 -->
        <div class="product-card">
            <img class="product-img" src="https://picsum.photos/300/200?random=31" alt="Product 1">
            <div class="product-info">
                <div class="product-title">Wireless Bluetooth Earbuds Pro</div>
                <div class="product-price">
                    <span class="current-price">₹999</span>
                    <span class="old-price">₹2,499</span>
                </div>
                <!-- ध्यान दें: यहाँ 91XXXXXXXXXX की जगह अपना व्हाट्सएप नंबर डालें -->
                <a href="https://wa.me/91XXXXXXXXXX?text=Hi!%20I%20want%20to%20order%20Wireless%20Bluetooth%20Earbuds%20Pro." target="_blank" class="whatsapp-btn">
                    🚚 Order via WhatsApp
                </a>
            </div>
        </div>

        <!-- प्रोडक्ट 2 -->
        <div class="product-card">
            <img class="product-img" src="https://picsum.photos/300/200?random=32" alt="Product 2">
            <div class="product-info">
                <div class="product-title">Smart Fitness Watch Series 5</div>
                <div class="product-price">
                    <span class="current-price">₹1,499</span>
                    <span class="old-price">₹3,999</span>
                </div>
                <!-- ध्यान दें: यहाँ 91XXXXXXXXXX की जगह अपना व्हाट्सएप नंबर डालें -->
                <a href="https://wa.me/91XXXXXXXXXX?text=Hi!%20I%20want%20to%20order%20Smart%20Fitness%20Watch%20Series%205." target="_blank" class="whatsapp-btn">
                    🚚 Order via WhatsApp
                </a>
            </div>
        </div>

    </div>

    <!-- बैनर को ऑटो-स्क्रॉल करने का कोड -->
    <script>
        let currentSlide = 0;
        const slider = document.getElementById('mainSlider');
        const totalSlides = 3; 

        setInterval(() => {
            currentSlide = (currentSlide + 1) % totalSlides;
            slider.style.transform = `translateX(-${(currentSlide * 100) / totalSlides}%)`;
        }, 3000); // हर 3 सेकंड में बैनर बदलेगा
    </script>
</body>
                                                       </html>
